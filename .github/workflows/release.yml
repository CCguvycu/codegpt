name: Build & Release

on:
  push:
    tags:
      - 'v*'

# Minimal permissions — only what's needed
permissions:
  contents: write
  id-token: write  # For npm provenance

jobs:
  build:
    runs-on: windows-latest
    environment: release  # Require environment approval for releases

    steps:
      # Pinned to exact commit SHAs — prevents supply chain attacks via action tampering
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install pinned dependencies
        run: |
          pip install requests==2.32.3 rich==13.9.4 prompt-toolkit==3.0.48 pyinstaller==6.11.1

      - name: Build exe
        run: |
          pyinstaller ai.spec

      - name: Verify exe
        run: |
          dist\ai.exe --version

      - name: Generate checksums
        run: |
          cd dist
          certutil -hashfile ai.exe SHA256 > ai.exe.sha256
          echo "SHA256 checksum:"
          type ai.exe.sha256

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          files: |
            dist/ai.exe
            dist/ai.exe.sha256
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
