name: Security Audit

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Audit Python dependencies
        run: |
          pip install pip-audit safety
          pip install -r requirements.txt
          echo "=== pip-audit (check for known CVEs) ==="
          pip-audit --strict --desc 2>&1 || true
          echo ""
          echo "=== safety check (vulnerability database) ==="
          safety check --full-report 2>&1 || true
          echo ""
          echo "=== Dependency tree (check for bloat) ==="
          pip install pipdeptree
          pipdeptree --warn silence 2>&1
          echo ""
          echo "=== Package count ==="
          pip list --format=json | python -c "import sys,json; pkgs=json.load(sys.stdin); print(f'Total packages: {len(pkgs)}'); [print(f'  WARNING: unexpected package: {p[\"name\"]}') for p in pkgs if p['name'] not in ('pip','setuptools','wheel','requests','rich','prompt-toolkit','qrcode','certifi','charset-normalizer','idna','urllib3','markdown-it-py','mdurl','pygments','wcwidth','colorama','pip-audit','safety','pipdeptree')]"

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: '20'

      - name: Audit npm dependencies
        run: |
          npm audit || true

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # Full history for scanning

      - name: Scan for secrets
        run: |
          echo "=== Scanning for hardcoded secrets ==="

          # Check for common secret patterns
          FOUND=0

          # API keys
          if grep -rn --include="*.py" --include="*.js" --include="*.json" \
            -E "(sk-[a-zA-Z0-9]{20,}|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36})" \
            --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "CRITICAL: Possible API key found!"
            FOUND=1
          fi

          # Private keys
          if grep -rn --include="*.py" --include="*.js" --include="*.json" --include="*.pem" \
            "PRIVATE KEY" \
            --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "CRITICAL: Private key found!"
            FOUND=1
          fi

          # Passwords in code
          if grep -rn --include="*.py" --include="*.js" \
            -iE "password\s*=\s*['\"][^'\"]{8,}" \
            --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "WARNING: Possible hardcoded password!"
            FOUND=1
          fi

          # Telegram tokens
          if grep -rn --include="*.py" --include="*.js" \
            -E "[0-9]{8,10}:[a-zA-Z0-9_-]{35}" \
            --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "CRITICAL: Possible Telegram bot token!"
            FOUND=1
          fi

          if [ "$FOUND" -eq 0 ]; then
            echo "No secrets found."
          else
            echo ""
            echo "Review the matches above. False positives are possible."
            exit 1
          fi

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Security linting
        run: |
          pip install bandit
          echo "=== Bandit security scan ==="
          bandit -r chat.py ai_cli/ -ll --skip B101,B404,B603,B607 || true
